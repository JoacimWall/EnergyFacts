name: Release

on:
  release:
    types: [published]

jobs:
  upload-release-asset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create integration zip
        run: |
          cd custom_components/my_solar_cells
          zip -r ../../my_solar_cells.zip .

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: my_solar_cells.zip
